; WordPress dev environment PHP overrides.
; Loaded as /usr/local/etc/php/conf.d/zz-fuelchef.ini so it wins over defaults.

memory_limit=512M
upload_max_filesize=256M
post_max_size=256M
max_execution_time=300
max_input_time=300
max_input_vars=5000

display_errors=On
error_reporting=E_ALL
log_errors=On
error_log=/dev/stderr

; OPcache — tuned for dev (revalidate frequently so file edits are visible)
opcache.enable=1
opcache.enable_cli=0
opcache.memory_consumption=128
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=10000
opcache.revalidate_freq=0
opcache.validate_timestamps=1
